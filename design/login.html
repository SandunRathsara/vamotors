<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In - VA Motors VSMS</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Theme toggle top-right -->
  <div style="position: fixed; top: 16px; right: 16px; z-index: 10;">
    <button class="theme-toggle" onclick="toggleTheme()">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg> Dark
    </button>
  </div>

  <div class="login-page">
    <div class="login-card">
      <img src="logo.jpeg" alt="VA Motors" class="login-logo" style="border-radius: 12px;">
      <h1 class="login-title">VA Motors</h1>
      <p class="login-subtitle">Vehicle Sale Management System</p>

      <form action="dashboard.html" method="get" onsubmit="return true;">
        <div class="form-group">
          <label class="form-label">Email Address</label>
          <input type="email" class="form-input" placeholder="you@vamotors.lk" value="kamal@vamotors.lk">
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" class="form-input" placeholder="Enter your password" value="password123">
        </div>
        <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px;">
          <label style="display: flex; align-items: center; gap: 8px; font-size: 0.82rem; color: var(--text-secondary); cursor: pointer;">
            <input type="checkbox" checked style="accent-color: var(--color-primary);"> Remember me
          </label>
          <a href="#" style="font-size: 0.82rem; font-weight: 600; color: var(--text-secondary);">Forgot password?</a>
        </div>
        <a href="dashboard.html" class="btn btn-primary btn-lg w-full" style="text-align: center;">Sign In</a>
      </form>

      <p style="text-align: center; margin-top: 24px; font-size: 0.75rem; color: var(--text-tertiary);">
        VA Motors VSMS v1.0 &middot; Colombo, Sri Lanka
      </p>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
